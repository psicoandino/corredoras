<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Gatekeeper</title>

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#111;
  --muted:#666;
  --border:#e5e7eb;

  --high:#dc2626;
  --medium:#f97316;
  --low:#2563eb;

  --radius:16px;
  --accent: #111111;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:1100px;
  margin:0 auto;
  padding:16px;
}

header{
  background:#111;
  color:white;
  padding:20px;
  margin-bottom:20px;
}

header h1{
  font-size:1.5rem;
}

.header-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.95rem;
}

.foco-badge {
  background: rgba(var(--accent-rgb, 17, 17, 17), 0.12);
  color: var(--accent);
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 600;
}

.profile-link {
  color: #aaa;
  font-size: 12px;
  text-decoration: none;
  cursor: pointer;
}

.profile-link:hover {
  text-decoration: underline;
}

.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:16px;
  border:1px solid var(--border);
}

input,
select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #d1d5db;
  margin-top:6px;
  margin-bottom:14px;
  font-size:1rem;
}

label{
  font-weight:600;
  display:block;
}

button{
  border:none;
  cursor:pointer;
  min-height:48px;
  border-radius:12px;
  padding:12px 16px;
  font-size:0.95rem;
}

.btn-primary{
  background:var(--accent);
  color:white;
}

.btn-secondary{
  background:#ececec;
}

.btn-danger{
  background:#dc2626;
  color:white;
}

.btn-whatsapp{
  background:#25D366;
  color:white;
}

.grid{
  display:grid;
  gap:16px;
}

.property-actions{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:12px;
}

.badge{
  display:inline-flex;
  align-items:center;
  padding:6px 10px;
  border-radius:999px;
  color:white;
  font-size:.85rem;
  font-weight:700;
}

.high{
  background:var(--high);
}

.medium{
  background:var(--medium);
}

.low{
  background:var(--low);
}

.small{
  color:var(--muted);
  font-size:.9rem;
}

.section-title{
  margin-bottom:16px;
}

.hidden{
  display:none;
}

.question-title{
  margin-bottom:18px;
  line-height:1.4;
}

.option{
  width:100%;
  text-align:left;
  background:white;
  border:1px solid var(--border);
  margin-bottom:12px;
}

.option.selected{
  border:2px solid var(--accent);
}

.thankyou{
  text-align:center;
  padding:32px 16px;
}

.lead-row{
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}

.back-btn{
  margin-bottom:16px;
}

.input-prefix{
  display:flex;
  align-items:center;
  border:1px solid #d1d5db;
  border-radius:12px;
  margin-top:6px;
  margin-bottom:14px;
  padding:0 14px;
  background:white;
}

.input-prefix span{
  white-space:nowrap;
}

.input-prefix input{
  border:none;
  margin:0;
  outline:none;
}

.error-text{
  color:#dc2626;
  font-size:.85rem;
  margin-top:-10px;
  margin-bottom:10px;
}

/* Onboarding Specific Styles */
.onboarding-screen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 16px;
  background: var(--bg);
}

.onboarding-header {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.onboarding-card {
  width: 100%;
  max-width: 420px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  border: 1px solid var(--border);
}

.onboarding-title {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 4px;
}

.onboarding-subtitle {
  font-size: 0.9rem;
  color: var(--muted);
  margin-bottom: 24px;
}

.toggle-pills {
  display: flex;
  gap: 8px;
  margin-top: 6px;
  margin-bottom: 14px;
}

.pill-btn {
  flex: 1;
  background: #ececec;
  color: var(--text);
  border-radius: 12px;
  text-align: center;
  font-weight: 500;
  min-height: 44px;
  padding: 10px;
}

.pill-btn.selected {
  background: var(--accent);
  color: white;
}

.swatches-row {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.swatch {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  border: 1px solid rgba(0,0,0,0.1);
  padding: 0;
  min-height: auto;
}

.swatch.selected {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
}

.btn-full {
  width: 100%;
}

@media (min-width:768px){

  .property-actions{
    flex-direction:row;
    flex-wrap:wrap;
  }

  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  .dashboard-layout{
    display:grid;
    grid-template-columns:350px 1fr;
    gap:24px;
    align-items:start;
  }
}
</style>

</head>
<body>

<div id="app"></div>

<datalist id="comunas">
  <option value="Cerrillos">
  <option value="Cerro Navia">
  <option value="Conchalí">
  <option value="El Bosque">
  <option value="Estación Central">
  <option value="Huechuraba">
  <option value="Independencia">
  <option value="La Cisterna">
  <option value="La Florida">
  <option value="La Granja">
  <option value="La Pintana">
  <option value="La Reina">
  <option value="Las Condes">
  <option value="Lo Barnechea">
  <option value="Lo Espejo">
  <option value="Lo Prado">
  <option value="Macul">
  <option value="Maipú">
  <option value="Ñuñoa">
  <option value="Padre Hurtado">
  <option value="Paine">
  <option value="Pedro Aguirre Cerda">
  <option value="Peñaflor">
  <option value="Peñalolén">
  <option value="Pirque">
  <option value="Providencia">
  <option value="Pudahuel">
  <option value="Puente Alto">
  <option value="Quilicura">
  <option value="Quinta Normal">
  <option value="Recoleta">
  <option value="Renca">
  <option value="San Bernardo">
  <option value="San Joaquín">
  <option value="San José de Maipo">
  <option value="San Miguel">
  <option value="San Ramón">
  <option value="Santiago">
  <option value="Talagante">
  <option value="Vitacura">
</datalist>

<script>
const STORAGE_PROPERTIES = "sg_properties";
const STORAGE_LEADS = "sg_leads";
const STORAGE_PROFILE = "sg_profile";

const PALETTES = [
  { name: "Carbón", hex: "#111111", rgb: "17, 17, 17" },
  { name: "Pizarra", hex: "#1e3a5f", rgb: "30, 58, 95" },
  { name: "Bosque", hex: "#1a4a3a", rgb: "26, 74, 58" },
  { name: "Terracota", hex: "#8b3a2a", rgb: "139, 58, 42" },
  { name: "Malva", hex: "#5a3a6b", rgb: "90, 58, 107" },
  { name: "Cobre", hex: "#7a4a1e", rgb: "122, 74, 30" }
];

function hexToRgbStr(hex) {
  const match = PALETTES.find(p => p.hex.toLowerCase() === hex.toLowerCase());
  if (match) return match.rgb;
  
  let c = hex.substring(1);
  if(c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  const num = parseInt(c, 16);
  return `${(num >> 16) & 255}, ${(num >> 8) & 255}, ${num & 255}`;
}

function applyPalette(hex) {
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-rgb', hexToRgbStr(hex));
}

function uid(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2);
}

function getProperties(){
  return JSON.parse(localStorage.getItem(STORAGE_PROPERTIES) || "[]");
}

function saveProperties(data){
  localStorage.setItem(STORAGE_PROPERTIES, JSON.stringify(data));
}

function getLeads(){
  return JSON.parse(localStorage.getItem(STORAGE_LEADS) || "[]");
}

function saveLeads(data){
  localStorage.setItem(STORAGE_LEADS, JSON.stringify(data));
}

function getProfile(){
  return JSON.parse(localStorage.getItem(STORAGE_PROFILE) || "null");
}

function saveProfile(data){
  localStorage.setItem(STORAGE_PROFILE, JSON.stringify(data));
}

function getParam(name){
  return new URLSearchParams(location.search).get(name);
}

function classify(score){
  if(score >= 75) return "HIGH";
  if(score >= 45) return "MEDIO";
  return "BAJO";
}

function badgeClass(tier){
  if(tier === "HIGH") return "high";
  if(tier === "MEDIO") return "medium";
  return "low";
}

const propertyId = getParam("propiedad");

if(propertyId){
  const profile = getProfile();
  if(profile && profile.palette) {
    applyPalette(profile.palette);
  }
  renderSurvey(propertyId);
}else{
  const profile = getProfile();
  if(!profile){
    renderOnboarding();
  }else{
    applyPalette(profile.palette);
    renderDashboard();
  }
}

function renderOnboarding(){
  const app = document.getElementById("app");
  
  let selectedFoco = "Ambos";
  let selectedPalette = PALETTES[0]; // Carbón

  app.innerHTML = `
    <div class="onboarding-screen">
      <div class="onboarding-header">Smart Gatekeeper</div>
      <div class="onboarding-card">
        <h2 class="onboarding-title">Configura tu perfil</h2>
        <p class="onboarding-subtitle">Solo necesitamos esto una vez.</p>
        
        <label>Nombre completo</label>
        <input id="onb-nombre" placeholder="Ej: María González">
        <div id="onb-nombre-error" class="error-text hidden">El nombre completo es requerido</div>
        
        <label>Zona principal</label>
        <input id="onb-zona" list="comunas">
        <div id="onb-zona-error" class="error-text hidden">La zona principal es requerida</div>
        
        <label>Foco de negocio</label>
        <div class="toggle-pills">
          <button type="button" class="pill-btn" data-foco="Arriendo">Arriendo</button>
          <button type="button" class="pill-btn" data-foco="Venta">Venta</button>
          <button type="button" class="pill-btn selected" data-foco="Ambos">Ambos</button>
        </div>
        <div id="onb-foco-error" class="error-text hidden">Debes seleccionar un foco de negocio</div>
        
        <label>Elige tu paleta</label>
        <div class="swatches-row">
          ${PALETTES.map((p, idx) => `
            <button type="button" class="swatch ${idx === 0 ? 'selected' : ''}" 
                    data-hex="${p.hex}" 
                    data-name="${p.name}" 
                    style="background: ${p.hex};" 
                    title="${p.name}">
            </button>
          `).join("")}
        </div>
        
        <button id="onb-submit" class="btn-primary btn-full">Comenzar</button>
      </div>
    </div>
  `;

  const pills = app.querySelectorAll(".toggle-pills .pill-btn");
  pills.forEach(p => {
    p.addEventListener("click", () => {
      pills.forEach(btn => btn.classList.remove("selected"));
      p.classList.add("selected");
      selectedFoco = p.getAttribute("data-foco");
    });
  });

  const swatches = app.querySelectorAll(".swatches-row .swatch");
  swatches.forEach(s => {
    s.addEventListener("click", () => {
      swatches.forEach(sw => sw.classList.remove("selected"));
      s.classList.add("selected");
      selectedPalette = {
        name: s.getAttribute("data-name"),
        hex: s.getAttribute("data-hex")
      };
    });
  });

  document.getElementById("onb-submit").addEventListener("click", () => {
    const nombre = document.getElementById("onb-nombre").value.trim();
    const zona = document.getElementById("onb-zona").value.trim();
    
    let hasError = false;
    
    if(!nombre) {
      document.getElementById("onb-nombre-error").classList.remove("hidden");
      hasError = true;
    } else {
      document.getElementById("onb-nombre-error").classList.add("hidden");
    }
    
    if(!zona) {
      document.getElementById("onb-zona-error").classList.remove("hidden");
      hasError = true;
    } else {
      document.getElementById("onb-zona-error").classList.add("hidden");
    }
    
    if(!selectedFoco) {
      document.getElementById("onb-foco-error").classList.remove("hidden");
      hasError = true;
    } else {
      document.getElementById("onb-foco-error").classList.add("hidden");
    }
    
    if(hasError) return;
    
    const profileData = {
      nombre,
      zona,
      foco: selectedFoco,
      palette: selectedPalette.hex,
      paletteName: selectedPalette.name,
      createdAt: new Date().toISOString()
    };
    
    saveProfile(profileData);
    applyPalette(profileData.palette);
    renderDashboard();
  });
}

function renderDashboard(){

  const app = document.getElementById("app");
  const profile = getProfile() || { nombre: "", foco: "" };

  app.innerHTML = `
    <header>
      <div class="container header-content">
        <h1>Smart Gatekeeper</h1>
        <div class="header-right">
          <span>${profile.nombre}</span>
          <span class="foco-badge">${profile.foco}</span>
          <a class="profile-link" id="mi-perfil-toggle">Mi perfil</a>
        </div>
      </div>
    </header>

    <div class="container">
      <div id="inline-profile-card" class="card hidden" style="margin-bottom: 20px;">
        <h3>Mi Perfil</h3>
        <p style="margin: 6px 0;"><strong>Nombre:</strong> ${profile.nombre}</p>
        <p style="margin: 6px 0;"><strong>Zona principal:</strong> ${profile.zona}</p>
        <p style="margin: 6px 0;"><strong>Foco de negocio:</strong> ${profile.foco}</p>
        <p style="margin: 6px 0;"><strong>Paleta:</strong> ${profile.paletteName || ""} (${profile.palette || ""})</p>
        <button id="editar-perfil-btn" class="btn-secondary" style="margin-top: 12px; min-height: 38px; padding: 6px 12px;">Editar perfil</button>
      </div>
    </div>

    <div class="container dashboard-layout">

      <div>
        <div class="card">
          <h2 class="section-title">+ Nueva Propiedad</h2>

          <label>Título</label>
          <input id="titulo">

          <label>Comuna</label>
          <input id="comuna" list="comunas">

          <label>Precio (UF)</label>
          <input id="precio" type="number">

          <label>Tipo</label>
          <select id="tipo">
            <option>Venta</option>
            <option>Arriendo</option>
          </select>

          <button id="crear" class="btn-primary">
            Guardar Propiedad
          </button>
        </div>
      </div>

      <div>
        <div id="properties"></div>
        <div id="leadDetail"></div>
      </div>

    </div>
  `;

  document.getElementById("mi-perfil-toggle").addEventListener("click", (e) => {
    e.preventDefault();
    const pCard = document.getElementById("inline-profile-card");
    pCard.classList.toggle("hidden");
  });

  document.getElementById("editar-perfil-btn").addEventListener("click", () => {
    localStorage.removeItem(STORAGE_PROFILE);
    location.reload();
  });

  document.getElementById("crear").addEventListener("click", () => {

    const titulo = document.getElementById("titulo").value.trim();
    const comuna = document.getElementById("comuna").value.trim();
    const precio = document.getElementById("precio").value.trim();
    const tipo = document.getElementById("tipo").value;

    if(!titulo || !comuna || !precio){
      alert("Completa todos los campos.");
      return;
    }

    const properties = getProperties();

    properties.unshift({
      id:uid(),
      titulo,
      comuna,
      precio,
      tipo,
      archived:false
    });

    saveProperties(properties);

    renderDashboard();
  });

  renderPropertyCards();
}

function renderPropertyCards(){

  const container = document.getElementById("properties");
  if(!container) return;

  const properties = getProperties().filter(p => !p.archived);
  const leads = getLeads();

  if(properties.length === 0){
    container.innerHTML = `
      <div class="card">
        Sin propiedades creadas.
      </div>
    `;
    return;
  }

  container.innerHTML = properties.map(property => {

    const propertyLeads = leads.filter(
      l => l.propertyId === property.id
    );

    const highCount = propertyLeads.filter(
      l => l.tier === "HIGH"
    ).length;

    return `
      <div class="card">
        <h3>${property.titulo}</h3>

        <p class="small">
          ${property.comuna}
        </p>

        <p>
          ${property.precio} UF · ${property.tipo}
        </p>

        <br>

        <p>
          Leads: <strong>${propertyLeads.length}</strong>
        </p>

        <p>
          HIGH: <strong>${highCount}</strong>
        </p>

        <div class="property-actions">

          <button
            class="btn-secondary"
            onclick="showLeads('${property.id}')">
            Ver Leads
          </button>

          <button
            class="btn-primary"
            onclick="copyLink('${property.id}')">
            Copiar Link
          </button>

          <button
            class="btn-danger"
            onclick="archiveProperty('${property.id}')">
            Archivar
          </button>

        </div>
      </div>
    `;
  }).join("");
}

function copyLink(id){

  const url =
    location.origin +
    location.pathname +
    "?propiedad=" +
    id;

  navigator.clipboard.writeText(url);

  alert("Link copiado.");
}

function archiveProperty(id){

  const properties = getProperties();

  const updated = properties.map(p => {

    if(p.id === id){
      p.archived = true;
    }

    return p;
  });

  saveProperties(updated);

  renderPropertyCards();
}

function showLeads(propertyId){

  const detail = document.getElementById("leadDetail");

  const leads = getLeads()
    .filter(l => l.propertyId === propertyId)
    .sort((a,b)=>b.score-a.score);

  if(leads.length === 0){

    detail.innerHTML = `
      <div class="card">
        No hay leads aún.
      </div>
    `;

    return;
  }

  detail.innerHTML = `
    <button
      class="btn-secondary back-btn"
      onclick="document.getElementById('leadDetail').innerHTML=''">
      Cerrar
    </button>

    <div class="card">

      <h2 class="section-title">
        Leads
      </h2>

      ${leads.map(lead=>`

        <div class="lead-row">

          <div class="badge ${badgeClass(lead.tier)}">
            ${lead.tier}
          </div>

          <br><br>

          <strong>${lead.name}</strong>

          <p>${lead.phone}</p>

          <p>${lead.email || "-"}</p>

          <p>
            Score: ${Math.round(lead.score)}
          </p>

          <br>

          <a
            href="https://wa.me/${lead.phone.replace(/\D/g,'')}"
            target="_blank">

            <button class="btn-whatsapp">
              WhatsApp
            </button>

          </a>

        </div>

      `).join("")}

    </div>
  `;
}

function renderSurvey(propertyId){

  const app = document.getElementById("app");

  const answers = {};

  const questions = [

    {
      key:"financial",
      title:"Situación financiera",
      options:[
        ["Compra al contado",100],
        ["Crédito hipotecario aprobado",100],
        ["Crédito en evaluación",50],
        ["Sin proceso bancario aún",0]
      ]
    },

    {
      key:"timeline",
      title:"Plazo de decisión",
      options:[
        ["Menos de 60 días",100],
        ["Entre 3 y 6 meses",60],
        ["Solo explorando",20]
      ]
    },

    {
      key:"role",
      title:"Rol en la decisión",
      options:[
        ["Soy el comprador directo",100],
        ["Decido junto a otra persona",80],
        ["Soy corredor externo",40]
      ]
    }
  ];

  let step = 0;

  function renderQuestion(){

    const q = questions[step];

    app.innerHTML = `
      <header>
        <div class="container">
          <h1>Smart Gatekeeper</h1>
        </div>
      </header>

      <div class="container">

        <div class="card">

          <h2 class="question-title">
            ${q.title}
          </h2>

          ${q.options.map(opt=>`
            <button
              class="option"
              data-value="${opt[1]}">
              ${opt[0]}
            </button>
          `).join("")}

        </div>

      </div>
    `;

    document
      .querySelectorAll(".option")
      .forEach(btn => {

        btn.addEventListener("click", () => {

          answers[q.key] =
            Number(btn.dataset.value);

          step++;

          if(step < questions.length){
            renderQuestion();
          }else{
            renderContactForm();
          }
        });

      });
  }

  function renderContactForm(){

    app.innerHTML = `
      <header>
        <div class="container">
          <h1>Smart Gatekeeper</h1>
        </div>
      </header>

      <div class="container">

        <div class="card">

          <h2 class="section-title">
            Tus datos
          </h2>

          <label>Nombre</label>
          <input id="name">

          <label>WhatsApp</label>

          <div class="input-prefix">
            <span>+56 9 </span>
            <input
              id="phone"
              inputmode="numeric"
              maxlength="8">
          </div>

          <label>Email</label>
          <input id="email" type="email">

          <div
            id="emailError"
            class="error-text hidden">
            Ingresa un email válido
          </div>

          <button
            id="submitLead"
            class="btn-primary">
            Enviar
          </button>

        </div>

      </div>
    `;

    document
      .getElementById("submitLead")
      .addEventListener("click", submitLead);

    document
      .getElementById("phone")
      .addEventListener("input",(e)=>{
        e.target.value =
          e.target.value
          .replace(/\D/g,"")
          .slice(0,8);
      });
  }

  function submitLead(){

    const name =
      document.getElementById("name").value.trim();

    const phoneDigits =
      document.getElementById("phone")
      .value.replace(/\D/g,"");

    const email =
      document.getElementById("email").value.trim();

    const emailError =
      document.getElementById("emailError");

    emailError.classList.add("hidden");

    if(!name || phoneDigits.length !== 8){
      alert("Completa los campos requeridos.");
      return;
    }

    const emailRegex =
      /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(email && !emailRegex.test(email)){
      emailError.classList.remove("hidden");
      return;
    }

    const phone = `+56 9 ${phoneDigits}`;

    const emailScore = email ? 20 : 0;

    const score =
      answers.financial * 0.45 +
      answers.timeline * 0.35 +
      answers.role * 0.15 +
      emailScore * 0.05;

    const tier = classify(score);

    const leads = getLeads();

    leads.push({
      id:uid(),
      propertyId,
      name,
      phone,
      email,
      score,
      tier,
      createdAt:new Date().toISOString()
    });

    saveLeads(leads);

    app.innerHTML = `
      <header>
        <div class="container">
          <h1>Smart Gatekeeper</h1>
        </div>
      </header>

      <div class="container">

        <div class="card thankyou">

          <h2>
            ¡Gracias por tu interés!
          </h2>

          <br>

          <p>
            Hemos recibido tu información.
            Un ejecutivo revisará tus datos
            y se pondrá en contacto contigo
            si la propiedad se ajusta a tu búsqueda.
          </p>

        </div>

      </div>
    `;
  }

  renderQuestion();
}
</script>

</html>
